<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layouts/main :: head('Login')}"></head>

<body style="display: flex; flex-direction: column; min-h-screen;">
    <nav th:replace="~{layouts/main :: navbar}"></nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="glass-card" style="width: 100%; max-width: 400px;">
            <h1 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h1>

            <div th:if="${param.error}"
                style="background: #fee2e2; color: var(--danger); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; text-align: center;">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}"
                style="background: #f0f9ff; color: var(--primary); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; text-align: center;">
                You have been logged out.
            </div>
            <div th:if="${param.success}"
                style="background: #ecfdf5; color: var(--success); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; text-align: center;">
                Registration successful! Please login.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="username" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--muted);">
                New here? <a th:href="@{/register}" style="color: var(--primary);">Create an account</a>
            </p>
        </div>
    </main>

    <footer th:replace="~{layouts/main :: footer}"></footer>
</body>

</html>

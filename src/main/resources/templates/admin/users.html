<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
      <meta charset="UTF-8">
      <title>Users Management - FoundIt+ Admin</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet">
      <style>
            * {
                  font-family: 'Outfit', 'Segoe UI', sans-serif;
            }

            body {
                  background: #f1f5f9;
            }

            .admin-sidebar {
                  background: #0F172A;
                  min-height: 100vh;
                  color: white;
                  padding: 30px 20px;
            }

            .nav-link-custom {
                  display: flex;
                  align-items: center;
                  gap: 12px;
                  padding: 12px 20px;
                  color: rgba(255, 255, 255, 0.7);
                  text-decoration: none;
                  border-radius: 12px;
                  margin-bottom: 8px;
                  transition: all 0.2s;
                  font-weight: 500;
            }

            .nav-link-custom:hover {
                  background: rgba(255, 255, 255, 0.05);
                  color: white;
            }

            .nav-link-custom.active {
                  background: #1A56DB;
                  color: white;
            }

            .admin-header {
                  padding: 30px 40px;
                  background: white;
                  border-bottom: 1px solid #E2E8F0;
                  margin-bottom: 40px;
            }

            .back-btn {
                  display: inline-flex;
                  align-items: center;
                  gap: 8px;
                  color: #64748B;
                  text-decoration: none;
                  font-weight: 600;
                  font-size: 0.85rem;
                  padding: 8px 16px;
                  border-radius: 10px;
                  transition: all 0.2s;
                  background: #F1F5F9;
            }

            .back-btn:hover {
                  color: #1E293B;
                  background: #E2E8F0;
            }

            .table-card {
                  border: none;
                  border-radius: 24px;
                  background: white;
                  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
                  overflow: hidden;
            }

            .table thead th {
                  background: #F8FAFC;
                  border-bottom: 2px solid #F1F5F9;
                  padding: 20px 24px;
                  color: #64748B;
                  font-weight: 700;
                  font-size: 0.75rem;
                  text-transform: uppercase;
                  letter-spacing: 1px;
            }

            .table tbody td {
                  padding: 18px 24px;
                  border-bottom: 1px solid #F1F5F9;
                  vertical-align: middle;
                  font-size: 0.9rem;
            }

            .user-avatar {
                  width: 40px;
                  height: 40px;
                  border-radius: 12px;
                  background: #EFF6FF;
                  color: #1A56DB;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-weight: 700;
            }

            .badge-admin {
                  background: #FEF2F2;
                  color: #DC2626;
                  font-weight: 700;
                  font-size: 0.7rem;
                  padding: 4px 10px;
                  border-radius: 6px;
            }

            .badge-user {
                  background: #EFF6FF;
                  color: #1A56DB;
                  font-weight: 700;
                  font-size: 0.7rem;
                  padding: 4px 10px;
                  border-radius: 6px;
            }

            .badge-mod {
                  background: #FFFBEB;
                  color: #D97706;
                  font-weight: 700;
                  font-size: 0.7rem;
                  padding: 4px 10px;
                  border-radius: 6px;
            }
      </style>
</head>

<body>
      <div class="d-flex">
            <!-- Sidebar (Same as Dashboard) -->
            <div class="admin-sidebar" style="width:280px;position:fixed;">
                  <div class="px-3 mb-5">
                        <h4 class="fw-bold"><i class="bi bi-search-heart me-2 text-primary"></i>FoundIt<span
                                    class="text-primary">+</span></h4>
                        <div class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 mt-2"
                              style="font-size:0.65rem;letter-spacing:1px;">ADMINISTRATOR</div>
                  </div>
                  <nav>
                        <a th:href="@{/admin/dashboard}" class="nav-link-custom"><i class="bi bi-speedometer2"></i>
                              Dashboard</a>
                        <a th:href="@{/admin/users}" class="nav-link-custom active"><i class="bi bi-people"></i> Manage
                              Users</a>
                        <a th:href="@{/admin/items}" class="nav-link-custom"><i class="bi bi-grid-3x3-gap"></i> System
                              Listings</a>
                        <a th:href="@{/moderator/claims}" class="nav-link-custom"><i class="bi bi-shield-check"></i>
                              Verification Claims</a>
                        <a th:href="@{/admin/reports}" class="nav-link-custom"><i class="bi bi-bar-chart"></i> System
                              Reports</a>
                        <hr class="my-4 opacity-10">
                        <a th:href="@{/}" class="nav-link-custom"><i class="bi bi-eye"></i> View Public Site</a>
                        <a th:href="@{/logout}" class="nav-link-custom text-danger"><i
                                    class="bi bi-box-arrow-right"></i> Logout</a>
                  </nav>
            </div>

            <!-- Main Content -->
            <div style="flex:1;margin-left:280px;">
                  <div class="admin-header d-flex justify-content-between align-items-center">
                        <div>
                              <a th:href="@{/admin/dashboard}" class="back-btn mb-2">
                                    <i class="bi bi-arrow-left"></i> Dashboard
                              </a>
                              <h2 class="fw-bold mb-0">User Management</h2>
                        </div>
                        <div class="text-muted small">Manage all accounts and permissions</div>
                  </div>

                  <div class="px-5 pb-5">
                        <div class="table-card card">
                              <div class="table-responsive">
                                    <table class="table mb-0">
                                          <thead>
                                                <tr>
                                                      <th>User</th>
                                                      <th>Email</th>
                                                      <th>Role</th>
                                                      <th>Status</th>
                                                      <th class="text-end">Actions</th>
                                                </tr>
                                          </thead>
                                          <tbody>
                                                <tr th:each="user : ${users}">
                                                      <td>
                                                            <div class="d-flex align-items-center gap-3">
                                                                  <div class="user-avatar"
                                                                        th:text="${#strings.substring(user.name,0,1)}">U
                                                                  </div>
                                                                  <div class="fw-bold text-dark" th:text="${user.name}">
                                                                        Username</div>
                                                            </div>
                                                      </td>
                                                      <td class="text-muted" th:text="${user.email}">email@example.com
                                                      </td>
                                                      <td>
                                                            <span th:if="${user.role.name() == 'admin'}"
                                                                  class="badge-admin">ADMIN</span>
                                                            <span th:if="${user.role.name() == 'moderator'}"
                                                                  class="badge-mod">MODERATOR</span>
                                                            <span th:if="${user.role.name() == 'user'}"
                                                                  class="badge-user">USER</span>
                                                      </td>
                                                      <td>
                                                            <span th:class="${user.enabled ? 'badge bg-success bg-opacity-10 text-success' : 'badge bg-secondary bg-opacity-10 text-secondary'}"
                                                                  th:text="${user.enabled ? 'Active Account' : 'Deactivated'}">Status</span>
                                                      </td>
                                                      <td class="text-end">
                                                            <div class="dropdown">
                                                                  <button class="btn btn-light btn-sm border"
                                                                        type="button" data-bs-toggle="dropdown">
                                                                        <i class="bi bi-three-dots"></i>
                                                                  </button>
                                                                  <ul
                                                                        class="dropdown-menu dropdown-menu-end shadow border-0">
                                                                        <li>
                                                                              <form th:action="@{'/admin/users/' + ${user.id} + '/toggle'}"
                                                                                    method="post">
                                                                                    <button type="submit"
                                                                                          class="dropdown-item d-flex align-items-center gap-2">
                                                                                          <i
                                                                                                th:class="${user.enabled ? 'bi bi-person-x text-danger' : 'bi bi-person-check text-success'}"></i>
                                                                                          <span
                                                                                                th:text="${user.enabled ? 'Deactivate User' : 'Activate User'}">Action</span>
                                                                                    </button>
                                                                              </form>
                                                                        </li>
                                                                  </ul>
                                                            </div>
                                                      </td>
                                                </tr>
                                          </tbody>
                                    </table>
                              </div>
                        </div>
                  </div>
            </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

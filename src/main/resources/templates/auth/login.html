<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login - FoundIt+</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#1e3a8a,#1A56DB,#0EA5E9);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{border-radius:20px;border:none;box-shadow:0 25px 60px rgba(0,0,0,0.2);max-width:420px;width:100%;padding:40px;}
.brand{font-size:2rem;font-weight:900;color:#1A56DB;text-align:center;margin-bottom:5px;}
.btn-login{background:linear-gradient(135deg,#1A56DB,#0EA5E9);color:white;border:none;width:100%;padding:12px;border-radius:10px;font-weight:700;font-size:1rem;}
.btn-login:hover{color:white;opacity:0.9;}
.form-control{border:2px solid #E2E8F0;border-radius:10px;padding:12px;}
.form-control:focus{border-color:#1A56DB;box-shadow:none;}
</style>
</head>
<body>
<div class="container">
<div class="d-flex justify-content-center">
<div class="card bg-white">
<div class="brand"><i class="bi bi-search-heart"></i> FoundIt+</div>
<p class="text-center text-muted mb-4 small">Sign in to your account</p>
<div th:if="${param.error}" class="alert alert-danger py-2 small">Invalid email or password.</div>
<div th:if="${param.logout}" class="alert alert-success py-2 small">Logged out successfully.</div>
<div th:if="${param.registered}" class="alert alert-success py-2 small">Account created! Please sign in.</div>
<form th:action="@{/login}" method="post">
<div class="mb-3">
<label class="form-label fw-semibold small">Email Address</label>
<input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
</div>
<div class="mb-3">
<label class="form-label fw-semibold small">Password</label>
<input type="password" name="password" class="form-control" placeholder="Your password" required>
</div>
<div class="mb-4">
<input type="checkbox" name="remember-me" id="rm">
<label for="rm" class="ms-2 text-muted small">Remember me for 7 days</label>
</div>
<button type="submit" class="btn btn-login mb-3">
<i class="bi bi-box-arrow-in-right me-2"></i>Sign In
</button>
<div class="text-center small text-muted">
Don't have an account? <a th:href="@{/register}" class="text-primary fw-semibold">Create one here</a>
</div>
<div class="text-center mt-2">
<a th:href="@{/items/list}" class="text-muted small text-decoration-none">
<i class="bi bi-eye me-1"></i>Browse as guest
</a>
</div>
</form>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

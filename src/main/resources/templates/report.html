<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layouts/main :: head('Report Item')}"></head>

<body>
    <nav th:replace="~{layouts/main :: navbar}"></nav>

    <main class="container" style="padding: 3rem 0;">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
            <h1>Report an Item</h1>
            <p style="color: var(--muted); margin-bottom: 2rem;">Please provide details about the lost or found item.
            </p>

            <form th:action="@{/items/report}" th:object="${item}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>What is the item?</label>
                    <input type="text" th:field="*{title}" class="form-control"
                        placeholder="e.g. iPhone 13, Black Backpack" required>
                </div>

                <div class="form-group">
                    <label>Report Type</label>
                    <select th:field="*{type}" class="form-control">
                        <option value="LOST">I lost this item</option>
                        <option value="FOUND">I found this item</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select th:field="*{category}" class="form-control">
                        <option value="Electronics">Electronics</option>
                        <option value="Documents">Documents/Wallets</option>
                        <option value="Clothing">Clothing/Accessories</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" th:field="*{location}" class="form-control"
                        placeholder="Where was it last seen or found?" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"
                        placeholder="Any specific details or distinguishing marks..."></textarea>
                </div>

                <div class="form-group">
                    <label>Upload Image</label>
                    <input type="file" name="file" class="form-control" accept="image/*">
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Report</button>
                    <a th:href="@{/dashboard}"
                        style="display: block; text-align: center; margin-top: 1rem; color: var(--secondary); text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{layouts/main :: footer}"></footer>
</body>

</html>

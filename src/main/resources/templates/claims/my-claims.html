<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
      <meta charset="UTF-8">
      <title>My Claims - FoundIt+</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet">
      <style>
            * {
                  font-family: 'Outfit', 'Segoe UI', sans-serif;
            }

            body {
                  background: #f1f5f9;
            }

            .back-nav {
                  display: inline-flex;
                  align-items: center;
                  gap: 8px;
                  color: #64748B;
                  text-decoration: none;
                  font-weight: 600;
                  font-size: 0.9rem;
                  padding: 8px 16px;
                  border-radius: 10px;
                  transition: all 0.2s;
                  background: white;
                  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            }

            .back-nav:hover {
                  color: #1A56DB;
                  background: #EFF6FF;
                  transform: translateX(-2px);
            }

            .claim-card {
                  border: none;
                  border-radius: 24px;
                  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
                  transition: all 0.3s;
                  background: white;
                  overflow: hidden;
            }

            .claim-card:hover {
                  transform: translateY(-6px);
                  box-shadow: 0 15px 45px rgba(0, 0, 0, 0.08);
            }

            .status-indicator {
                  padding: 12px 24px;
                  font-weight: 800;
                  font-size: 0.75rem;
                  text-transform: uppercase;
                  letter-spacing: 1px;
            }

            .status-approved {
                  background: #F0FDF4;
                  color: #16A34A;
            }

            .status-pending {
                  background: #FFFBEB;
                  color: #D97706;
            }

            .status-rejected {
                  background: #FEF2F2;
                  color: #DC2626;
            }

            .claim-body {
                  padding: 28px;
            }

            .item-preview {
                  background: #F8FAFC;
                  border-radius: 16px;
                  padding: 16px;
                  margin-bottom: 20px;
                  border: 1px solid #E2E8F0;
            }

            .btn-details {
                  background: #1A56DB;
                  color: white;
                  border-radius: 12px;
                  padding: 12px;
                  font-weight: 700;
                  width: 100%;
                  transition: all 0.2s;
                  text-decoration: none;
                  display: block;
                  text-align: center;
            }

            .btn-details:hover {
                  background: #1e40af;
                  color: white;
                  transform: translateY(-2px);
            }

            .notes-box {
                  background: #F1F5F9;
                  border-radius: 12px;
                  padding: 16px;
                  font-size: 0.85rem;
                  color: #475569;
                  border-left: 4px solid #CBD5E1;
            }
      </style>
</head>

<body>
      <div th:replace="~{fragments/navbar :: navbar}"></div>

      <div class="container mt-4 mb-5">
            <!-- Back Button -->
            <a th:href="@{/dashboard}" class="back-nav mb-4">
                  <i class="bi bi-arrow-left"></i>Dashboard
            </a>

            <div class="mb-5">
                  <h2 class="fw-bold mb-1"><i class="bi bi-clipboard-check me-3 text-primary"></i>My Claims</h2>
                  <p class="text-muted mb-0">Track the status of your ownership verification requests.</p>
            </div>

            <div th:if="${#lists.isEmpty(claims)}" class="text-center py-5">
                  <div class="bg-white rounded-5 p-5 shadow-sm d-inline-block">
                        <i class="bi bi-card-list fs-1 text-muted mb-3 d-block"></i>
                        <h4 class="fw-bold text-dark">No claims yet</h4>
                        <p class="text-muted mb-4">When you find something that belongs to you, submit a claim.</p>
                        <a th:href="@{/items/list}" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow">
                              Browse Items
                        </a>
                  </div>
            </div>

            <div class="row g-4">
                  <div class="col-lg-6" th:each="claim : ${claims}">
                        <div class="claim-card h-100">
                              <div
                                    th:class="${'status-indicator ' + (claim.status.name() == 'APPROVED' ? 'status-approved' : claim.status.name() == 'REJECTED' ? 'status-rejected' : 'status-pending')}">
                                    <i
                                          th:class="${'bi ' + (claim.status.name() == 'APPROVED' ? 'bi-check-circle-fill' : claim.status.name() == 'REJECTED' ? 'bi-x-circle-fill' : 'bi-clock-fill')} + ' me-2'"></i>
                                    <span th:text="${claim.status}">STATUS</span>
                              </div>

                              <div class="claim-body">
                                    <div class="item-preview d-flex align-items-center gap-3">
                                          <img th:if="${claim.item.imagePath != null}"
                                                th:src="@{'/uploads/' + ${claim.item.imagePath}}"
                                                style="width:50px;height:50px;border-radius:10px;object-fit:cover;">
                                          <div th:unless="${claim.item.imagePath != null}"
                                                style="width:50px;height:50px;border-radius:10px;background:#E2E8F0;display:flex;align-items:center;justify-content:center;">
                                                <i class="bi bi-image text-muted"></i>
                                          </div>
                                          <div>
                                                <div class="small text-muted text-uppercase fw-bold letter-spacing-1"
                                                      style="font-size:0.65rem;">Claimed Item</div>
                                                <h6 class="fw-bold mb-0 text-dark" th:text="${claim.item.title}">Item
                                                      Title</h6>
                                          </div>
                                    </div>

                                    <div class="mb-4">
                                          <h6 class="fw-bold small text-uppercase text-muted mb-2">My Proof Description
                                          </h6>
                                          <p class="small text-dark mb-0" th:text="${claim.proofDescription}">Proof
                                                details...</p>
                                    </div>

                                    <div th:if="${claim.reviewNotes != null}" class="notes-box mb-4">
                                          <div class="fw-bold mb-1"><i class="bi bi-chat-left-text me-2"></i>Moderator
                                                Notes:</div>
                                          <div th:text="${claim.reviewNotes}">Notes go here...</div>
                                    </div>

                                    <a th:href="@{'/items/' + ${claim.item.id}}" class="btn btn-details">
                                          <i class="bi bi-eye me-2"></i>View Item Details
                                    </a>
                              </div>
                        </div>
                  </div>
            </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

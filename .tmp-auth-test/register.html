<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register - FoundIt+</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#1e3a8a,#1A56DB,#0EA5E9);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 0;}
.card{border-radius:20px;border:none;box-shadow:0 25px 60px rgba(0,0,0,0.2);max-width:480px;width:100%;padding:40px;}
.brand{font-size:2rem;font-weight:900;color:#1A56DB;text-align:center;margin-bottom:5px;}
.btn-register{background:linear-gradient(135deg,#1A56DB,#0EA5E9);color:white;border:none;width:100%;padding:14px;border-radius:10px;font-weight:700;font-size:1rem;}
.btn-register:hover{color:white;opacity:0.9;}
.form-control{border:2px solid #E2E8F0;border-radius:10px;padding:12px;}
.form-control:focus{border-color:#1A56DB;box-shadow:none;}
.field-error{color:#DC2626;font-size:0.8rem;margin-top:4px;}
</style>
</head>
<body>
<div class="container">
<div class="d-flex justify-content-center">
<div class="card bg-white">
<div class="brand"><i class="bi bi-search-heart"></i> FoundIt+</div>
<p class="text-center text-muted mb-4 small">Create your free account</p>




<form action="/register" method="post" novalidate><input type="hidden" name="_csrf" value="n0D1DS5A_a_FDAQVH6v_3EAYaW4qAZaVK3q-Ush-01rdoykuryLDa0p1ysnoajwgK4bL5XB5RFcYZ6-4T0qLZ_BN4GrtwEga"/>

<div class="mb-3">
<label class="form-label fw-semibold small">Full Name <span class="text-danger">*</span></label>
<input type="text" class="form-control" placeholder="Your full name" required minlength="2" id="name" name="name" value="">

</div>

<div class="mb-3">
<label class="form-label fw-semibold small">Email Address <span class="text-danger">*</span></label>
<input type="email" class="form-control" placeholder="your@email.com" required id="email" name="email" value="">

</div>

<div class="mb-3">
<label class="form-label fw-semibold small">Phone Number <span class="text-muted">(optional)</span></label>
<input type="text" class="form-control" placeholder="+1234567890" id="phone" name="phone" value="">
</div>

<div class="mb-3">
<label class="form-label fw-semibold small">Password <span class="text-danger">*</span></label>
<div class="input-group">
<input type="password" class="form-control" placeholder="Min 6 characters" required id="pwd" name="password" value="">
<button class="btn btn-outline-secondary" type="button" onclick="togglePwd('pwd')"><i class="bi bi-eye"></i></button>
</div>

</div>

<div class="mb-4">
<label class="form-label fw-semibold small">Confirm Password <span class="text-danger">*</span></label>
<div class="input-group">
<input type="password" class="form-control" placeholder="Repeat password" required id="cpwd" name="confirmPassword" value="">
<button class="btn btn-outline-secondary" type="button" onclick="togglePwd('cpwd')"><i class="bi bi-eye"></i></button>
</div>

</div>

<button type="submit" class="btn btn-register mb-3">
<i class="bi bi-person-plus me-2"></i>Create Account
</button>

<div class="text-center small text-muted">
Already have an account? <a href="/login" class="text-primary fw-semibold">Sign in here</a>
</div>
</form>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(id) {
  var x = document.getElementById(id);
  x.type = x.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
